<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — TradeFeed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0c0a09;
      color: #fafaf9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #34d399, #059669);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 30px rgba(5,150,105,0.2);
    }
    .logo span { color: #fff; font-weight: 800; font-size: 24px; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    h1 span { color: #34d399; }
    p { color: #78716c; font-size: 0.95rem; max-width: 360px; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      background: #059669;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #34d399; }
    .hint {
      color: #57534e; font-size: 0.75rem;
      margin-top: 1rem;
    }
    /* Cached shops section */
    #cached-shops { display: none; width: 100%; max-width: 480px; margin-top: 2rem; text-align: left; }
    #cached-shops h2 { font-size: 0.85rem; color: #a8a29e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; text-align: center; }
    .shop-card {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: #1c1917;
      border: 1px solid #292524;
      margin-bottom: 0.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }
    .shop-card:hover { border-color: #059669; }
    .shop-avatar {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #34d399, #059669);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .shop-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .shop-info { flex: 1; min-width: 0; }
    .shop-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shop-meta { font-size: 0.75rem; color: #78716c; margin-top: 2px; }
    .arrow { color: #57534e; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="logo"><span>T</span></div>
  <h1>Trade<span>Feed</span></h1>
  <p>
    You're offline right now. Check your internet connection and try again.
    Your cart and wishlist are saved locally — they'll be here when you're back online.
  </p>
  <button onclick="window.location.reload()">Try Again</button>
  <p class="hint">Load shedding? Your data is safe. 🔌</p>

  <div id="cached-shops">
    <h2>Previously Visited Shops</h2>
    <div id="shop-list"></div>
  </div>

  <script>
    // Read cached shops from IndexedDB and display them.
    // These shops were cached by CatalogCacheManager on previous visits.
    (function() {
      if (!('indexedDB' in window)) return;

      var request = indexedDB.open('tradefeed-catalog', 1);
      request.onerror = function() {};
      request.onupgradeneeded = function() {
        // DB doesn't exist yet — no cached data
        request.result.close();
      };
      request.onsuccess = function() {
        var db = request.result;
        if (!db.objectStoreNames.contains('shops')) { db.close(); return; }

        var tx = db.transaction('shops', 'readonly');
        var store = tx.objectStore('shops');
        var getAll = store.getAll();

        getAll.onsuccess = function() {
          var shops = getAll.result;
          if (!shops || shops.length === 0) { db.close(); return; }

          // Filter out stale entries (>24h old)
          var cutoff = Date.now() - 24 * 60 * 60 * 1000;
          shops = shops.filter(function(s) { return s.cachedAt > cutoff; });
          if (shops.length === 0) { db.close(); return; }

          // Sort by most recently cached
          shops.sort(function(a, b) { return b.cachedAt - a.cachedAt; });

          var container = document.getElementById('cached-shops');
          var list = document.getElementById('shop-list');
          container.style.display = 'block';

          shops.forEach(function(shop) {
            var card = document.createElement('a');
            card.href = '/catalog/' + encodeURIComponent(shop.slug);
            card.className = 'shop-card';

            var avatar = document.createElement('div');
            avatar.className = 'shop-avatar';
            if (shop.logoUrl) {
              var img = document.createElement('img');
              img.src = shop.logoUrl;
              img.alt = shop.name;
              avatar.appendChild(img);
            } else {
              avatar.textContent = shop.name.charAt(0).toUpperCase();
            }

            var info = document.createElement('div');
            info.className = 'shop-info';
            var name = document.createElement('div');
            name.className = 'shop-name';
            name.textContent = shop.name;
            var meta = document.createElement('div');
            meta.className = 'shop-meta';
            var mins = Math.round((Date.now() - shop.cachedAt) / 60000);
            meta.textContent = mins < 60
              ? 'Visited ' + mins + 'm ago'
              : 'Visited ' + Math.round(mins / 60) + 'h ago';
            info.appendChild(name);
            info.appendChild(meta);

            var arrow = document.createElement('span');
            arrow.className = 'arrow';
            arrow.textContent = '→';

            card.appendChild(avatar);
            card.appendChild(info);
            card.appendChild(arrow);
            list.appendChild(card);
          });

          db.close();
        };
        getAll.onerror = function() { db.close(); };
      };
    })();
  </script>
</body>
</html>
